name: Массовая запись
on:
  workflow_dispatch: # Ручной запуск

jobs:
  record:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Чтобы падение одной станции не отменяло остальные
      matrix:
        station:
          - { name: "DFM Краснодар", url: "http://85.174.227.198:8009/dfm_server" }
          - { name: "Бизнес-FM Кубань", url: "http://195.128.153.153:8005/businessfm" }
          - { name: "Вести-FM Кубань", url: "http://icecast-vgtrk.cdnvideo.ru/vesti_kuban" }
          - { name: "Europa Plus Краснодар", url: "http://online2.gkvr.ru:8000/europa_krd_128.aac" }
          - { name: "Радио Звезда", url: "https://listen3.myradio24.com/zvezdafm" }
          - { name: "Казак FM", url: "http://radio.mediacdn.ru/kazak_fm.mp3" }
          - { name: "Комсомольская правда Краснодар", url: "http://kpradio.hostingradio.ru:8000/krasnodar.radiokp128.mp3" }
          - { name: "Радио Краснодар", url: "http://46.29.9.42:8100/krasnodar" }
          - { name: "Радио Кубань", url: "http://stream.kuban.fm:9000/" }
          - { name: "Радио Маяк Кубань", url: "http://icecast-vgtrk.cdnvideo.ru/mayak_kuban" }
          - { name: "Новое радио Кубань", url: "http://emgregion.hostingradio.ru:8064/krasnodar.novoe.mp3" }
          - { name: "Первое радио Кубани", url: "http://stream.pervoe.fm:8000/" }
          - { name: "Радио 107", url: "http://online.radio107.ru:8000/radio107_320.mp3" }
          - { name: "Радио России Кубань", url: "http://icecast-vgtrk.cdnvideo.ru/rr_kuban" }
          - { name: "Ретро FM Краснодар", url: "http://emgregion.hostingradio.ru:8064/krasnodar.retrofm.mp3" }

    steps:
      - name: Установка FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Запись и загрузка
        env:
          TG_TOKEN: ${{ vars.TG_TOKEN }}
          CHAT_ID: ${{ vars.CHAT_ID }}
        run: |
          # 1. Формируем безопасное имя файла
          SAFE_NAME=$(echo "${{ matrix.station.name }}" | tr ' ' '_')
          DATE_STR=$(date +'%d-%m-%Y_%H-%M')
          FILENAME="${SAFE_NAME}_${DATE_STR}.mp3"
          
          # 2. Запись с перекодированием в 96k для исправления таймингов и входа в лимит 50Мб
          # -t 3900 это 65 минут (буфер 5 минут)
          ffmpeg -i "${{ matrix.station.url }}" -t 3900 -c:a libmp3lame -b:a 96k "$FILENAME"
          
          # 3. Рандомная задержка перед отправкой (от 1 до 120 сек)
          # Разносим нагрузку на API Telegram
          sleep $((1 + $RANDOM % 120))
          
          # 4. Отправка в Telegram с заполнением метаданных
          # Это сделает плеер в ТГ красивым
          curl -v \
            -F chat_id="$CHAT_ID" \
            -F audio=@"$FILENAME" \
            -F caption="🎙 ${{ matrix.station.name }}
          ⏰ Эфир от $(date +'%d.%m.%Y %H:%M')" \
            -F title="${{ matrix.station.name }}" \
            -F performer="Радио Архив" \
            "https://api.telegram.org/bot$TG_TOKEN/sendAudio"
