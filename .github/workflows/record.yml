name: Запись радио
on:
  workflow_dispatch: # Возможность запустить вручную

jobs:
  record:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Если одна запись упадет, остальные продолжат работу
      matrix:
        station:
          - name: "Первое Радио Кубани"
            url: "https://stream.pervoe.fm:8443/"
          - name: "Казак FM"
            url: "http://radio.mediacdn.ru/kazak_fm.mp3"
          - name: "Радио Краснодар"
            url: "http://46.29.9.42:8100/krasnodar"

    steps:
      - uses: actions/checkout@v4

      - name: Установка FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Запись и загрузка
        env:
          TG_TOKEN: ${{ vars.TG_TOKEN }} # Настоятельно рекомендую Secrets!
          CHAT_ID: ${{ vars.CHAT_ID }}
        run: |
          # 1. Готовим имя файла. Убираем пробелы только для системного имени файла, чтобы не было бед
          SAFE_NAME=$(echo "${{ matrix.station.name }}" | tr ' ' '_')
          FILENAME="${SAFE_NAME}_$(date +'%d-%m-%Y_%H-%M').mp3"
          
          # 2. Формируем красивую подпись для Telegram (тут пробелы и русские буквы разрешены)
          CAPTION="Запись эфира: ${{ matrix.station.name }}
          Дата: $(date +'%d.%m.%Y %H:%M')"
          
          # 3. Запись потока
          ffmpeg -i "${{ matrix.station.url }}" -t 360 -c copy "$FILENAME"
          
          # 4. Отправка в Telegram
          # Мы передаем caption через отдельный флаг -F. 
          # Это САМЫЙ надежный способ: curl сам упакует русские буквы правильно.
          curl -v \
            -F chat_id="$CHAT_ID" \
            -F audio=@"$FILENAME" \
            -F caption="$CAPTION" \
            "https://api.telegram.org/bot$TG_TOKEN/sendAudio"
